<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/tokens/colors.css">
  <link rel="stylesheet" href="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/tokens/typography.css">
  <link rel="stylesheet" href="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap">
  <meta name="ext-resource-dependency" content="assets/wordmark.svg" data-resource-id="wordmark" />
  <script src="_ds/sean-choe-portfolio-design-system-9019b678-175c-4b52-b38a-67a68b6b931b/_ds_bundle.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { color: var(--text-accent); }
    a:hover { color: var(--accent-hover); }
    @keyframes scp-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes seanai-rise { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes seanai-bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      @keyframes scp-fade { from { opacity: 1; } to { opacity: 1; } }
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 999px; border: 3px solid var(--bg-base); }
    /* Text tiles: copy to the top, CTA pinned to the bottom */
    .scp-deck a { justify-content: flex-start !important; }
    .scp-deck a > div { flex: 1 1 auto; }
    .scp-deck a > div > span:last-child { margin-top: auto !important; padding-top: var(--space-4); }
    @media (max-width: 900px) {
      .scp-deck { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 640px) {
      .scp-deck { grid-template-columns: 1fr !important; padding-top: 3rem !important; }
      .scp-deck > div { aspect-ratio: auto !important; min-height: 220px; }
      .scp-main { padding-top: 132px !important; }
    }
  </style>
</helmet>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#F5F3EE"/>
    <text x="50" y="60" font-family="Georgia, serif" font-size="34" fill="#2A6FDB" text-anchor="middle">SC</text>
  </svg>
</template>
<div style="{{ themeVars }}">
  <x-import component-from-global-scope="PortfolioApp" from="./PortfolioApp.jsx" hint-size="100%,100%"></x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;accent&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: &quot;#2A6FDB&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Theme&quot;,
    &quot;options&quot;: [&quot;#2A6FDB&quot;, &quot;#1F8A5B&quot;, &quot;#6E6BC4&quot;, &quot;#B5893C&quot;, &quot;#D45B31&quot;]
  },
  &quot;showGrid&quot;: {
    &quot;editor&quot;: &quot;boolean&quot;,
    &quot;default&quot;: true,
    &quot;tsType&quot;: &quot;boolean&quot;,
    &quot;section&quot;: &quot;Hero grid&quot;
  },
  &quot;gridColor&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: &quot;#6FA8E0&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Hero grid&quot;,
    &quot;options&quot;: [&quot;#6FA8E0&quot;, &quot;#8FB89A&quot;, &quot;#C9A0D0&quot;, &quot;#9A9995&quot;]
  }
}">
class Component extends DCLogic {
  renderVals() {
    const accent = this.props.accent || "#2A6FDB";
    const grid = this.props.gridColor || "#6FA8E0";
    const showGrid = this.props.showGrid !== false;
    return {
      themeVars: {
        minHeight: "100%",
        "--accent": accent,
        "--accent-hover": "color-mix(in srgb, " + accent + " 75%, #ffffff)",
        "--accent-press": "color-mix(in srgb, " + accent + " 82%, #000000)",
        "--text-accent": accent,
        "--accent-contrast": "#ffffff",
        "--selection-bg": "color-mix(in srgb, " + accent + " 22%, transparent)",
        "--hero-grid-display": showGrid ? "block" : "none",
        "--hero-grid-line": "color-mix(in srgb, " + grid + " 16%, transparent)",
        "--hero-grid-tint": "color-mix(in srgb, " + grid + " 2%, transparent)",
      },
    };
  }
}
</script>
</body>
</html>
